<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🐥 Flappy Richard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-container">

  <h1>🐥 Flappy Richard</h1>
  <p>don’t let him crash 😭</p>

  <canvas id="gameCanvas"></canvas>

  <p id="score">Score: 0</p>

  <!-- ACHIEVEMENT POPUP -->
  <div id="achievement" class="achievement hidden"></div>

  <!-- START SCREEN -->
  <div id="startScreen" class="overlay">
    <div class="popup">
      <h2>🐥 Flappy Richard</h2>
      <p>SPACE or CLICK to flap</p>
      <p>Avoid the pipes 💀</p>
      <button onclick="startGame()">▶️ Start</button>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="gameOverScreen" class="overlay" style="display:none;">
    <div class="popup">
      <h2>💀 Richard crashed</h2>
      <p id="finalScore"></p>
      <button onclick="restartGame()">🔁 Restart</button>
      <button onclick="goHome()">🏠 Back to Arcade</button>
    </div>
  </div>

</div>

<script src="flappy.js"></script>
</body>
</html>
